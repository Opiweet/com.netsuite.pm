<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>project-phase-management</title>
    <script>
      // Apply theme before first paint to avoid flash
      ;(function () {
        var stored = localStorage.getItem('ppm_theme')
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.dataset.theme = 'dark'
        }
      })()
    </script>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #fff;
        transition: opacity 0.2s ease;
      }
      :root[data-theme='dark'] #app-loader {
        background: #16171d;
      }
      #app-loader.hide {
        opacity: 0;
        pointer-events: none;
      }
      .loader-spinner {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        border: 2.5px solid rgba(0, 165, 106, 0.18);
        border-top-color: #00a56a;
        animation: spin 0.75s linear infinite;
      }
      .loader-label {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        font-size: 12px;
        font-weight: 500;
        color: #9ca3af;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="loader-spinner"></div>
      <div class="loader-label">Loading Project & Revenue Management</div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Fade out the loader once Vue has mounted into #app
      var observer = new MutationObserver(function () {
        if (document.querySelector('#app').children.length) {
          var loader = document.getElementById('app-loader')
          if (loader) {
            loader.classList.add('hide')
            setTimeout(function () {
              loader.remove()
            }, 220)
          }
          observer.disconnect()
        }
      })
      observer.observe(document.getElementById('app'), { childList: true })
    </script>
  </body>
</html>
